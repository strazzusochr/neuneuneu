<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
  text { font-family: Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #0C447C; }
  .ts { font-size: 12px; font-weight: 400; fill: #185FA5; }

  /* Red boxes */
  .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red .th { fill: #791F1F; }
  .c-red .ts { fill: #A32D2D; }

  /* Amber boxes */
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  /* Purple boxes */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  /* Teal boxes */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* Blue boxes */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  /* Gray boxes */
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  /* Coral boxes */
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  line.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
</style>
</defs>

<!-- Header -->
<text class="th" x="340" y="30" text-anchor="middle" style="font-size:14px; fill:#2C2C2A;">Dein Spiel-Profil — Last-Analyse &amp; Cloud-Mapping</text>

<!-- LAST-DIAGNOSE Box -->
<g class="c-red">
  <rect x="40" y="50" width="600" height="64" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="74" text-anchor="middle" dominant-baseline="central">Warum 94°C? — Deine spezifische Last-Kombination</text>
  <text class="ts" x="340" y="93" text-anchor="middle" dominant-baseline="central">Fotorealismus-Shader + NPC-KI-Pathfinding + Simulations-Physik = dreifache GPU+CPU-Volllast gleichzeitig</text>
  <text class="ts" x="340" y="108" text-anchor="middle" dominant-baseline="central">Typisch: 85-95% GPU-Auslastung dauerhaft → Throttling → Schäden ab 90°C+</text>
</g>

<!-- Fotorealismus -->
<g class="c-amber">
  <rect x="40" y="138" width="184" height="130" rx="10" stroke-width="0.5"/>
  <text class="th" x="132" y="162" text-anchor="middle" dominant-baseline="central">Fotorealismus</text>
  <text class="ts" x="132" y="180" text-anchor="middle" dominant-baseline="central">GPU-Last: 60-70%</text>
  <text class="ts" x="132" y="198" text-anchor="middle" dominant-baseline="central">PBR-Shader, HDR,</text>
  <text class="ts" x="132" y="214" text-anchor="middle" dominant-baseline="central">Ray-Tracing, SSAO,</text>
  <text class="ts" x="132" y="230" text-anchor="middle" dominant-baseline="central">Bloom, DOF, Shadows</text>
  <text class="ts" x="132" y="248" text-anchor="middle" dominant-baseline="central">→ In Cloud: RTX 4090</text>
</g>

<!-- NPC AI -->
<g class="c-purple">
  <rect x="248" y="138" width="184" height="130" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central">NPC KI-Systeme</text>
  <text class="ts" x="340" y="180" text-anchor="middle" dominant-baseline="central">CPU-Last: 40-60%</text>
  <text class="ts" x="340" y="198" text-anchor="middle" dominant-baseline="central">Pathfinding (A*),</text>
  <text class="ts" x="340" y="214" text-anchor="middle" dominant-baseline="central">Behavior Trees,</text>
  <text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">State Machines, ML</text>
  <text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central">→ In Cloud: 32+ Kerne</text>
</g>

<!-- Simulation -->
<g class="c-teal">
  <rect x="456" y="138" width="184" height="130" rx="10" stroke-width="0.5"/>
  <text class="th" x="548" y="162" text-anchor="middle" dominant-baseline="central">Puzzle / Simulation</text>
  <text class="ts" x="548" y="180" text-anchor="middle" dominant-baseline="central">CPU+GPU: 20-40%</text>
  <text class="ts" x="548" y="198" text-anchor="middle" dominant-baseline="central">Physik-Solver,</text>
  <text class="ts" x="548" y="214" text-anchor="middle" dominant-baseline="central">Fluid, Partikel,</text>
  <text class="ts" x="548" y="230" text-anchor="middle" dominant-baseline="central">Grid-Logic, Events</text>
  <text class="ts" x="548" y="248" text-anchor="middle" dominant-baseline="central">→ In Cloud: skalierbar</text>
</g>

<!-- Arrows to Cloud Solution -->
<line x1="132" y1="268" x2="132" y2="306" class="arr" stroke="#BA7517" marker-end="url(#arrow)"/>
<line x1="340" y1="268" x2="340" y2="306" class="arr" stroke="#534AB7" marker-end="url(#arrow)"/>
<line x1="548" y1="268" x2="548" y2="306" class="arr" stroke="#0F6E56" marker-end="url(#arrow)"/>

<!-- Cloud Solution -->
<g class="c-blue">
  <rect x="40" y="306" width="600" height="80" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="332" text-anchor="middle" dominant-baseline="central">Cloud-Stack — Empfehlung für dein Profil</text>
  <text class="ts" x="340" y="352" text-anchor="middle" dominant-baseline="central">Engine: Babylon.js (WebGPU) + Vagon Cloud-Dev (RTX 4090) + iRender Render-Farm</text>
  <text class="ts" x="340" y="368" text-anchor="middle" dominant-baseline="central">NPC-KI: TensorFlow.js Cloud Workers — Physik: Havok WASM — Assets: Cloudflare R2</text>
</g>

<!-- Arrow to local PC -->
<line x1="340" y1="386" x2="340" y2="418" class="arr" stroke="#185FA5" marker-end="url(#arrow)"/>

<!-- Local PC -->
<g class="c-gray">
  <rect x="40" y="418" width="600" height="60" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="445" text-anchor="middle" dominant-baseline="central">Dein Home-PC nach Migration</text>
  <text class="ts" x="340" y="463" text-anchor="middle" dominant-baseline="central">GPU: 0% — CPU: &lt;3% — Temp: &lt;40°C — Nur Browser-Stream empfangen</text>
